<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
  <title>OffSecIntel — Under Construction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Ubuntu&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      background: linear-gradient(to top, #4d3838, #fa0303);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    #content {
      height: 100%;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Ubuntu, sans-serif;
      color: #fff;
      position: relative;
      z-index: 10;
    }

    #content h1,
    #content p {
      margin: -8rem 0 0 1rem;
    }

    #content p { margin-top: 0.5rem; }

    #content a { color: #fff; }

    #outerCraneContainer {
      position: absolute;
      width: 100%;
      height: 100%;
      bottom: 0;
      overflow: hidden;
      display: flex;
      justify-content: center;
      box-shadow: inset 0 -60px 0 -30px #000000;
    }

    .buildings {
      height: 84.97px;
      width: 100%;
      left: 0;
    }

    .buildings div {
      height: inherit;
      width: 42.48px;
      background: #000;
      position: absolute;
      bottom: 10%;
    }

    .buildings div::after {
      content: '';
      width: 80%;
      height: 60%;
      left: 10%;
      bottom: 30%;
      background: url("data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAMAAAAGCAYAAAAG5SQMAAAAFElEQVQImWP4////fwYYIJKDEwAAfPsP8eFXG40AAAAASUVORK5CYII=") repeat;
      position: absolute;
    }

    .buildings div:nth-of-type(1) { width: 42.48px; height: 21.24px; right: 37%; bottom: 18%; }
    .buildings div:nth-of-type(1)::after { bottom: 11%; }
    .buildings div:nth-of-type(2) { width: 48.55px; height: 28.32px; right: 30%; bottom: 35%; transform: rotate(180deg); }
    .buildings div:nth-of-type(2)::after { width: 60%; left: 11%; }
    .buildings div:nth-of-type(3) { width: 24.28px; height: 37.76px; left: 40%; bottom: 35%; }
    .buildings div:nth-of-type(3)::after { bottom: 0; width: 20%; height: 85%; left: 70%; }
    .buildings div:nth-of-type(4) { width: 84.97px; height: 21.24px; left: 24%; bottom: 20%; }
    .buildings div:nth-of-type(4)::after { background: none; }
    .buildings div:nth-of-type(5) { width: 61.79px; height: 67.97px; left: 47%; bottom: 10%; }
    .buildings div:nth-of-type(5)::after { bottom: 0; width: 40%; height: 85%; left: 20%; }

    .crane, .buildings { position: absolute; bottom: 0; }

    .crane div { border-radius: 2px; position: absolute; }

    .crane .line { border: none; background: #000; outline: 1px solid transparent; z-index: 0; }
    .crane .lineOne { width: 60%; left: 11%; top: 0; }
    .crane .lineTwo { width: 19%; right: 8%; top: 0; }
    .crane .line.lineThree { height: 30%; top: 22%; left: 9%; }
    .crane .line.lineThree::after {
      content: '';
      position: absolute;
      height: 0.2em;
      width: 9000%;
      background: #35475F;
      display: block;
      bottom: 0;
      left: -4500%;
      border: solid 1px #000;
    }

    .craneTwo .line.lineThree::after { height: 0.1em; }
    .craneThree .line.lineThree::after { height: 0.05em; }

    .stand { height: 100%; width: 5%; right: 25%; z-index: 1; background: linear-gradient(to top, #000, #3f5877); }
    .craneTwo .stand { background: linear-gradient(to top, #000, #415f81); }
    .craneThree .stand { background: linear-gradient(to top, #000, #161433); }

    .weight { height: 20%; width: 8%; right: 4%; top: 12%; z-index: 2; background: #161B36; }
    .craneTwo .weight { background: #0a2544; }
    .craneThree .weight { background: #2f2b4e; }

    .cabin { height: 9%; width: 12%; right: 24%; top: 20%; z-index: 2; background: #161B36; }
    .cabin::after { content: ''; position: absolute; height: 10%; width: 100%; background: #fff; display: block; top: 60%; left: 0; }
    .craneTwo .cabin { background: #29282e; }
    .craneThree .cabin { background: #3d3755; }

    .arm { height: 7%; width: 100%; top: 15%; z-index: 3; background: #161B36; }
    .craneTwo .arm { background: #1c203b; }
    .craneThree .arm { background: #0c1236; }
    .crane div.arm { border-top-left-radius: 10px; }

    .craneOne { width: 260px; height: 169.93px; left: 20%; }
    .craneOne div { border: solid 1px #000; }
    .craneOne .line { height: 1px; }
    .craneOne .lineThree { width: 1px; }

    .craneTwo { width: 200px; height: 130.72px; transform: scaleX(-1); left: 40%; z-index: -1; }
    .craneTwo div { border: solid 1px #000; }
    .craneTwo .line { height: 0.77px; }
    .craneTwo .lineThree { width: 0.71px; animation-delay: 3s; }
    .craneTwo .cabin, .craneTwo .arm, .craneTwo .weight { animation-delay: 3s; }

    .craneThree { width: 130px; height: 84.97px; left: 60%; z-index: -1; }
    .craneThree div { border: solid 1px #000; }
    .craneThree .line { height: 0.5px; }
    .craneThree .lineThree { width: 0.5px; animation-delay: 1.5s; }
    .craneThree .cabin, .craneThree .arm, .craneThree .weight { animation-delay: 1.5s; }

    .crane { perspective: 600px; }

    .lineOne { transform-origin: right 0; animation: moveLineOne 12s infinite alternate; }
    .lineTwo { transform-origin: top left; animation: moveLineTwo 12s infinite alternate; }
    .lineThree { transform-origin: right center; animation: moveLineThree 12s ease-in-out infinite alternate; }
    .cabin, .arm { transform-origin: 80% center; animation: moveCrane 12s infinite alternate; }
    .weight { transform-origin: 0 center; animation: moveWeight 12s infinite alternate; }

    #license { position: absolute; bottom: 0; right: 5px; }

    @keyframes moveCrane {
      0%, 20% { transform: rotateY(0); }
      70%, 100% { transform: rotateY(45deg); }
    }
    @keyframes moveWeight {
      0%, 20% { transform: rotateY(0) translateX(0); }
      70%, 100% { transform: rotateY(45deg) translateX(-50%); }
    }
    @keyframes moveLineOne {
      0%, 20% { transform: rotateY(0) rotateZ(-10deg); }
      70%, 100% { transform: rotateY(45deg) rotateZ(-10deg); }
    }
    @keyframes moveLineTwo {
      0%, 20% { transform: rotateY(0) rotateZ(29deg); }
      70%, 100% { transform: rotateY(15deg) rotateZ(29deg); }
    }
    @keyframes moveLineThree {
      0%        { transform: translate(0, 0); }
      20%       { transform: translate(2500%, -18%); }
      60%       { transform: translate(11000%, -25%); }
      70%       { transform: translate(9100%, -25%); height: 30%; }
      90%, 100% { transform: translate(9100%, -15%); height: 80%; }
    }
  </style>
</head>
